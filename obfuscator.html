<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dubuhub Lua Obfuscator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
    }
    .container { max-width: 1000px; width: 100%; margin: 0 auto; padding: 30px 20px; }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header h1 { font-size: 1.8rem; color: #58a6ff; }
    .header .links { display: flex; gap: 16px; }
    .header .links a { color: #8b949e; text-decoration: none; font-size: 0.9rem; }
    .header .links a:hover { color: #58a6ff; }
    .subtitle { color: #8b949e; margin-bottom: 24px; font-size: 0.95rem; }
    .editor-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 768px) {
      .editor-container { grid-template-columns: 1fr; }
    }
    .editor-box { display: flex; flex-direction: column; }
    .editor-box label {
      font-size: 0.85rem;
      color: #8b949e;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .editor-box label .badge {
      background: #21262d;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
      margin-left: 8px;
      font-weight: normal;
    }
    textarea {
      width: 100%;
      height: 400px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #58a6ff; }
    textarea:disabled { opacity: 0.6; }
    .options {
      display: flex;
      gap: 16px;
      margin-top: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn {
      background: #238636;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #2ea043; }
    .btn:disabled { background: #30363d; cursor: not-allowed; }
    .btn-secondary {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
    }
    .btn-secondary:hover { background: #30363d; }
    .btn-danger {
      background: #da3633;
    }
    .btn-danger:hover { background: #f85149; }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .stats {
      margin-top: 16px;
      display: flex;
      gap: 24px;
      font-size: 0.85rem;
      color: #8b949e;
    }
    .stats span strong { color: #c9d1d9; }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #238636;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      z-index: 100;
    }
    .toast.show { display: block; }
    .toast.error { background: #da3633; }
    .footer { margin-top: 20px; text-align: center; color: #484f58; font-size: 0.85rem; }
    .loader {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid #30363d;
      border-top: 2px solid #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    .loader.show { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1>Dubuhub Obfuscator</h1>
        <div class="links">
          <a href="/">Paste Host</a>
          <a href="https://dubuhub.vercel.app" target="_blank">dubuhub.vercel.app</a>
        </div>
      </div>
      <p class="subtitle">Paste your Lua script and obfuscate it to protect your source code.</p>

      <div class="editor-container">
        <div class="editor-box">
          <label>Input <span class="badge">Original Lua</span></label>
          <textarea id="inputCode" placeholder="Paste your Lua script here..."></textarea>
        </div>
        <div class="editor-box">
          <label>Output <span class="badge">Obfuscated</span></label>
          <textarea id="outputCode" placeholder="Obfuscated code will appear here..." readonly></textarea>
        </div>
      </div>

      <div class="options">
        <div class="btn-group">
          <button class="btn" id="obfuscateBtn" onclick="obfuscate()">Obfuscate</button>
          <button class="btn btn-secondary" onclick="copyOutput()">Copy Output</button>
          <button class="btn btn-secondary" onclick="downloadOutput()">Download</button>
          <button class="btn btn-danger" onclick="clearAll()">Clear</button>
        </div>
        <div class="loader" id="loader"></div>
      </div>

      <div class="stats" id="stats" style="display:none;">
        <span>Original: <strong id="originalSize">0</strong> bytes</span>
        <span>Obfuscated: <strong id="obfuscatedSize">0</strong> bytes</span>
        <span>Blowup: <strong id="blowup">0</strong>x</span>
      </div>
    </div>
    <div class="footer">dubuhub.vercel.app &middot; Lua Obfuscator &middot; Free &amp; Fast</div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    async function obfuscate() {
      const input = document.getElementById('inputCode').value.trim();
      const btn = document.getElementById('obfuscateBtn');
      const loader = document.getElementById('loader');
      const output = document.getElementById('outputCode');

      if (!input) {
        showToast('Please enter Lua code first', true);
        return;
      }

      btn.disabled = true;
      loader.classList.add('show');
      btn.textContent = 'Obfuscating...';

      try {
        const res = await fetch('/api/obfuscate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: input })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Obfuscation failed');

        output.value = data.obfuscated;

        // Show stats
        document.getElementById('originalSize').textContent = data.originalLength;
        document.getElementById('obfuscatedSize').textContent = data.obfuscatedLength;
        const blowup = (data.obfuscatedLength / data.originalLength).toFixed(2);
        document.getElementById('blowup').textContent = blowup;
        document.getElementById('stats').style.display = 'flex';

        showToast('Obfuscated successfully! (' + blowup + 'x size increase)');
      } catch (err) {
        showToast('Error: ' + err.message, true);
      } finally {
        btn.disabled = false;
        loader.classList.remove('show');
        btn.textContent = 'Obfuscate';
      }
    }

    async function copyOutput() {
      const text = document.getElementById('outputCode').value;
      if (!text) { showToast('Nothing to copy', true); return; }
      try {
        await navigator.clipboard.writeText(text);
        showToast('Copied to clipboard!');
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        showToast('Copied to clipboard!');
      }
    }

    function downloadOutput() {
      const text = document.getElementById('outputCode').value;
      if (!text) { showToast('Nothing to download', true); return; }
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'obfuscated.lua';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Downloaded as obfuscated.lua');
    }

    function clearAll() {
      document.getElementById('inputCode').value = '';
      document.getElementById('outputCode').value = '';
      document.getElementById('stats').style.display = 'none';
    }

    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show';
      if (isError) t.classList.add('error');
      setTimeout(() => { t.classList.remove('show'); t.classList.remove('error'); }, 2500);
    }

    // Ctrl+Enter to obfuscate
    document.getElementById('inputCode').addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        obfuscate();
      }
    });
  </script>
</body>
</html>
